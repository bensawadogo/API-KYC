name: Secret Scanner

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  scan:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Check for .env files committed
        run: |
          if git ls-files | grep -E '\.env$|\.env\.' | grep -v '.env.example'; then
            echo "ERREUR: fichier .env commit\u00e9 d\u00e9tect\u00e9"
            exit 1
          fi

      - name: Check for hardcoded keys
        run: |
          # Patterns de cl\u00e9s r\u00e9elles (jamais dans le code)
          if grep -r --include="*.go" \
            -E "dk_live_[a-zA-Z0-9_]+" \
            services/ ; then
            echo "ERREUR: cl\u00e9 dk_live_ trouv\u00e9e dans le code Go"
            exit 1
          fi
          # V\u00e9rifie que les mots de passe ne sont pas hardcod\u00e9s
          if grep -r --include="*.go" \
            -E 'password\s*:=\s*"[^"]{8,}"' \
            services/ ; then
            echo "ERREUR: password hardcod\u00e9 dans le code Go"
            exit 1
          fi
