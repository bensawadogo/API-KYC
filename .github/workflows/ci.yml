name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "18"
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: datakeys/kyc-service

jobs:
  # ─────────────────────── API Go ───────────────────────
  api:
    name: API (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/kyc

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            services/kyc/.cache
          key: go-${{ hashFiles('services/kyc/go.sum') }}

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -timeout 120s -count=1 -coverprofile=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: services/kyc/coverage.out

      - name: Build
        run: go build -ldflags="-w -s" -o kyc-service ./cmd/

  # ─────────────────────── SDK Go ──────────────────────
  sdk-go:
    name: SDK Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/go

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go build ./...
      - run: go vet ./...

  # ─────────────────────── SDK JS/TS ───────────────────
  sdk-js:
    name: SDK JavaScript/TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/javascript

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: sdks/javascript/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npx tsc --noEmit

  # ─────────────────────── SDK Python ──────────────────
  sdk-py:
    name: SDK Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install .
      - name: Smoke test
        run: python -c "from datakeys import Datakeys; print('SDK Python OK')"

  # ─────────────────────── Docker build ────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [api, sdk-go, sdk-js, sdk-py]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/kyc
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────── Release ─────────────────────
  release-sdks:
    name: Release SDKs
    runs-on: ubuntu-latest
    needs: [api, sdk-go, sdk-js, sdk-py]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sdks/javascript/dist/index.js
            sdks/javascript/dist/index.mjs
