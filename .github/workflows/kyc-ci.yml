name: KYC Service CI

on:
  push:
    branches: [main, develop]
    paths:
      - "services/kyc/**"
      - ".github/workflows/kyc-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/kyc/**"

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       kyc_test
          POSTGRES_USER:     kyc_user
          POSTGRES_PASSWORD: kyc_secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    env:
      CGO_ENABLED: 0
      POSTGRES_URL: postgres://kyc_user:kyc_secret@localhost:5432/kyc_test?sslmode=disable
      REDIS_URL: localhost:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/kyc/go.mod
          cache-dependency-path: services/kyc/go.sum

      - name: Download dependencies
        working-directory: services/kyc
        run: go mod download

      - name: Build
        working-directory: services/kyc
        run: |
          CGO_ENABLED=0 go build ./...

      - name: Vet
        working-directory: services/kyc
        run: go vet ./...

      - name: Test with race detection
        working-directory: services/kyc
        run: |
          CGO_ENABLED=1 go test ./... \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -timeout 120s \
            -count=1

      - name: Coverage check
        working-directory: services/kyc
        run: |
          total=$(go tool cover -func=coverage.out | \
                  grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${total}%"
          if (( $(echo "$total < 65" | bc -l) )); then
            echo "Coverage ${total}% < 65% minimum"
            exit 1
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: services/kyc/coverage.out
          flags: kyc-service
          fail_ci_if_error: false

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: services/kyc
          file:    services/kyc/Dockerfile
          push:    false
          tags:    kyc-service:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Check image size
        run: |
          size=$(docker image inspect kyc-service:${{ github.sha }} \
                 --format='{{.Size}}')
          mb=$((size / 1024 / 1024))
          echo "Image size: ${mb}MB"
          if [ $mb -gt 50 ]; then
            echo "Image ${mb}MB > 50MB limit"
            exit 1
          fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/kyc/go.mod

      - name: Run govulncheck
        working-directory: services/kyc
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: "-exclude=G104 ./services/kyc/..."
